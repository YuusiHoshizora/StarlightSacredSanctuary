<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错误：无法访问该页面</title>

    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/error.css">
</head>
<body>

    <div class="background"></div>
    <div class="overlay"></div>

    <!-- ===== 导航栏 ===== -->
    <header class="navbar">
        <div class="logo">星光圣域</div>
        <nav>
            <a href="/">首页</a>
            <a href="/starmap/">星图</a>
            <a href="/fleet/">舰队</a>
            <a href="/archive/">档案</a>
        </nav>
    </header>

    <!-- ===== 错误内容（统一页面） ===== -->
    <main class="error-container">
        <div class="error-code">ERROR</div>
        <div class="error-sub">SIGNAL LOST</div>
        <div class="error-message">
             错误：无法访问该页面
            <span>由于当前处于极端异常情况，星光圣域推荐您向最近的星光圣域永恒协议成员获取帮助</span>
        </div>

        <a href="/" class="btn-return">
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <path d="M9.5 3L5 8l4.5 5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            返回星域首页
        </a>

        <div class="glitch-line">⚠ 通信链路中断 — 正在尝试重新连接…</div>
    </main>

    <!-- Service Worker 注册 -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>

</body>
</html>
