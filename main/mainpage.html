<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主页面 · 星光圣域</title>

    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/main/mainpage.css">

    <!-- marked.js 用于 Markdown 渲染 -->
    <script src="../assets/js/marked.min.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then((reg) => {
                    console.log('SW registered: ', reg.scope);
                }).catch((err) => {
                    console.log('SW registration failed: ', err);
                });
            });
        }
    </script>
</head>

<body>

    <div class="background"></div>
    <div class="overlay"></div>

    <header class="navbar">
        <div class="logo">星光圣域</div>
        <nav>
            <a href="..">首页</a>
            <a href="../starmap/">星图</a>
            <a href="../fleet/">舰队</a>
            <a href="../archive/">档案</a>
        </nav>
    </header>

    <!-- ===== 三栏主布局 ===== -->
    <div class="main-layout">

        <!-- 左侧栏：导航分类 -->
        <aside class="left-panel">
            <div class="nav-section-title">分类</div>
            <nav class="vertical-nav">
                <a href="#" data-filter="all">全部</a>
                <a href="#" data-filter="重要通知">重要通知</a>
                <a href="#" data-filter="本地日志">本地日志</a>
                <a href="#" data-filter="观测报告">观测报告</a>
                <a href="#" data-filter="技术文档">技术文档</a>
                <a href="#" data-filter="航行手记">航行手记</a>
            </nav>
        </aside>

        <!-- 中间栏：博客文章列表 / Markdown 文章视图 -->
        <main class="center-panel">

            <!-- 列表视图 -->
            <div class="blog-list-view" id="blog-list-view">
                <div class="blog-header">
                    <h1>事件列表</h1>
                    <div class="subtitle" id="subtitle-text">愿星光照亮我们的前程</div>
                </div>

                <div class="blog-list" id="blog-list">

                    <article class="blog-card" data-md-src="../assets/post/beacon-47.md">
                        <div class="blog-title"></div>
                        <div class="blog-meta">
                            <span class="blog-date"></span>
                            <span class="sep">·</span>
                            <span class="blog-tag"></span>
                        </div>
                        <div class="blog-excerpt"></div>
                    </article>

                    <article class="blog-card" data-md-src="../assets/post/warp-coolant-optimization.md">
                        <div class="blog-title"></div>
                        <div class="blog-meta">
                            <span class="blog-date"></span>
                            <span class="sep">·</span>
                            <span class="blog-tag"></span>
                        </div>
                        <div class="blog-excerpt"></div>
                    </article>

                    <article class="blog-card" data-md-src="../assets/post/starmap-calibration.md">
                        <div class="blog-title"></div>
                        <div class="blog-meta">
                            <span class="blog-date"></span>
                            <span class="sep">·</span>
                            <span class="blog-tag"></span>
                        </div>
                        <div class="blog-excerpt"></div>
                    </article>

                </div>
            </div>

            <!-- 文章视图（Markdown 渲染后展示） -->
            <div class="article-view" id="article-view">
                <button class="back-btn" id="back-btn">
                    <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9.5 3L5 8l4.5 5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    返回列表
                </button>
                <div id="article-content"></div>
            </div>

        </main>

        <!-- 右侧栏：日历 + 信息 -->
        <aside class="right-panel">

            <div class="calendar-widget">
                <div class="calendar-header">
                    <span class="year-month" id="cal-year-month"></span>
                    <div class="nav-arrows">
                        <button class="nav-arrow" id="cal-prev">‹</button>
                        <button class="nav-arrow" id="cal-next">›</button>
                    </div>
                </div>
                <div class="calendar-grid" id="cal-grid">
                    <!-- 由 JavaScript 动态生成 -->
                </div>
            </div>

            <div class="right-info">
                <div class="info-item">
                    <div class="label">当前所处势力范围</div>
                    地球联合国 U.N.E.
                </div>
                <div class="info-item">
                    <div class="label">当前所处星系</div>
                    太阳（Sol）
                </div>
            </div>

        </aside>
    </div>

<script>
(function() {

    // ===== Markdown 渲染配置 =====
    marked.setOptions({
        breaks: true,        // 单换行视为 <br>
        gfm: true,           // GitHub Flavored Markdown
    });

    // ===== 视图切换 =====
    const listView    = document.getElementById('blog-list-view');
    const articleView = document.getElementById('article-view');
    const articleContent = document.getElementById('article-content');
    const backBtn     = document.getElementById('back-btn');

    /**
     * 展示文章视图
     * @param {string} mdContent - Markdown 字符串
     * @param {string} title     - 文章标题
     * @param {string} date      - 发布日期
     * @param {string} tag       - 分类标签
     */
    function showArticle(mdContent, title, date, tag) {
        listView.classList.add('hidden');
        articleView.classList.add('active');

        // 移除第一行的标签和第二行的日期（避免渲染到正文）
        var lines = mdContent.split(/\r?\n/);
        var tagIdx = -1, dateIdx = -1;
        for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (tagIdx === -1 && line.startsWith('#') && !line.startsWith('##')) {
                tagIdx = i;
            } else if (tagIdx !== -1 && dateIdx === -1 && line && !line.startsWith('---')) {
                dateIdx = i;
                break;
            }
        }
        // 从后往前删除，避免索引变化
        if (dateIdx > tagIdx) {
            lines.splice(dateIdx, 1);
            lines.splice(tagIdx, 1);
        } else if (tagIdx !== -1) {
            lines.splice(tagIdx, 1);
        }
        mdContent = lines.join('\n');

        // 渲染文章头部 + Markdown 内容
        articleContent.innerHTML =
            '<div class="article-header">' +
                '<h1>' + escapeHtml(title) + '</h1>' +
                '<div class="article-meta">' +
                    '<span>' + escapeHtml(date) + '</span>' +
                    '<span>·</span>' +
                    '<span>' + escapeHtml(tag) + '</span>' +
                '</div>' +
            '</div>' +
            '<div class="markdown-body">' + marked.parse(mdContent) + '</div>';

        // 滚动到顶部
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showList() {
        articleView.classList.remove('active');
        listView.classList.remove('hidden');
        articleContent.innerHTML = '';
    }

    backBtn.addEventListener('click', showList);

// ===== 左侧分类过滤 =====
document.querySelector('.vertical-nav').addEventListener('click', function(e) {
    const link = e.target.closest('a[data-filter]');
    if (!link) return;
    e.preventDefault();

    // 移除所有分类链接的选中状态
    this.querySelectorAll('a[data-filter]').forEach(function(a) {
        a.classList.remove('active');
    });

    // 如果点击的不是"全部"，才添加选中状态
    if (link.dataset.filter !== 'all') {
        link.classList.add('active');
    }

    const filter = link.dataset.filter;
    const cards = document.querySelectorAll('.blog-card');

    cards.forEach(function(card) {
        if (filter === 'all' || card.dataset.tag === filter) {
            card.style.display = '';
        } else {
            card.style.display = 'none';
        }
    });

    // 如果在文章视图中，先返回列表
    if (articleView.classList.contains('active')) {
        showList();
    }
});

    // ===== 安全转义辅助 =====
    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ===== 从 Markdown 第一行提取标签（格式：`#标签` 或 `# 标签`） =====
    function extractTag(mdText) {
        var lines = mdText.split(/\r?\n/);
        for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (line.startsWith('#') && !line.startsWith('##')) {
                return line.replace(/^#\s*/, '').trim();
            }
        }
        return '';
    }

    // ===== 从 Markdown 第二行提取日期（标签行的下一行） =====
    function extractDate(mdText) {
        var lines = mdText.split(/\r?\n/);
        for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (line.startsWith('#') && !line.startsWith('##')) {
                // 标签行，取它的下一行作为日期
                if (i + 1 < lines.length) {
                    return lines[i + 1].trim();
                }
                return '';
            }
                }
        return '';
    }

    // ===== 日历渲染 =====
    const today = new Date();
    let displayYear  = today.getFullYear();
    let displayMonth = today.getMonth();

    const yearMonthEl = document.getElementById('cal-year-month');
    const gridEl      = document.getElementById('cal-grid');
    const prevBtn     = document.getElementById('cal-prev');
    const nextBtn     = document.getElementById('cal-next');

    const monthNames = ['01','02','03','04','05','06','07','08','09','10','11','12'];

    function renderCalendar(year, month) {
        const firstDay       = new Date(year, month, 1);
        const lastDay        = new Date(year, month + 1, 0);
        const startDayOfWeek = firstDay.getDay();
        const daysInMonth    = lastDay.getDate();
        const prevMonthLastDay = new Date(year, month, 0).getDate();

        yearMonthEl.textContent = 'A.D. ' + year + '-' + monthNames[month];

        let html = '';
        const dayNames = ['Sun.','Mon.','Tues.','Wed.','Thur.','Fri.','Sat.'];
        for (let d = 0; d < 7; d++) {
            html += '<div class="day-name">' + dayNames[d] + '</div>';
        }
        for (let i = 0; i < startDayOfWeek; i++) {
            const date = prevMonthLastDay - startDayOfWeek + 1 + i;
            html += '<div class="day-cell other-month">' + date + '</div>';
        }
        for (let date = 1; date <= daysInMonth; date++) {
            const isToday = (year === today.getFullYear() && month === today.getMonth() && date === today.getDate());
            html += '<div class="day-cell' + (isToday ? ' today' : '') + '">' + date + '</div>';
        }
        const totalCells = startDayOfWeek + daysInMonth;
        const remaining  = (7 - (totalCells % 7)) % 7;
        for (let i = 1; i <= remaining; i++) {
            html += '<div class="day-cell other-month">' + i + '</div>';
        }
        gridEl.innerHTML = html;
    }

    prevBtn.addEventListener('click', function() {
        displayMonth--;
        if (displayMonth < 0) { displayMonth = 11; displayYear--; }
        renderCalendar(displayYear, displayMonth);
    });
    nextBtn.addEventListener('click', function() {
        displayMonth++;
        if (displayMonth > 11) { displayMonth = 0; displayYear++; }
        renderCalendar(displayYear, displayMonth);
    });

    renderCalendar(displayYear, displayMonth);

    // ===== 随机副标题 =====
    const subtitles = [
        "愿星光照亮我们的前程",
        "警告：无法连接至星域网或索拉克矩阵",
        "警告：无法连接至星光圣域主服务器",
        "警告：Astra未正常运行",
        "主页面加载完成",
        "事件列表加载完成",
    ];
    const subtitleEl = document.getElementById('subtitle-text');
    if (subtitleEl) {
        subtitleEl.textContent = subtitles[Math.floor(Math.random() * subtitles.length)];
    }

    // ===== Markdown 内容缓存 & 从文章自动提取简介 =====
    var mdCache = {};

    function fetchMdCached(src) {
        if (!mdCache[src]) {
            mdCache[src] = fetch(src).then(function(r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.text();
            });
        }
        return mdCache[src];
    }

    function extractExcerpt(mdText) {
        var lines = mdText.split(/\r?\n/);
        var excerpt = '';
        var skipCount = 0;
        for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line || line.startsWith('---')) continue;
            skipCount++;
            if (skipCount <= 2) continue; // 跳过第1行（标签）和第2行（日期）
            excerpt = line.slice(0, 100);
            if (line.length > 100) excerpt += '…';
            break;
        }
        if (!excerpt) {
            excerpt = mdText.replace(/\s+/g, ' ').slice(0, 120);
            if (excerpt.length === 120) excerpt += '…';
        }
        return excerpt;
    }

    // 从 data-md-src 提取文件名（去掉路径和 .md 后缀）作为标题
    function filenameToTitle(src) {
        var name = src.replace(/\\/g, '/').split('/').pop(); // 取最后一段
        if (name.endsWith('.md')) name = name.slice(0, -3);
        return name;
    }

    // 页面加载后遍历所有有 data-md-src 的卡片，自动填充标题、标签、日期与简介
    document.querySelectorAll('.blog-card[data-md-src]').forEach(function(card) {
        var src = card.dataset.mdSrc;
        var titleEl = card.querySelector('.blog-title');
        var excerptEl = card.querySelector('.blog-excerpt');
        var dateEl = card.querySelector('.blog-date');
        var tagEl = card.querySelector('.blog-tag');

        if (src && titleEl) {
            titleEl.textContent = filenameToTitle(src);
        }
        if (src) {
            fetchMdCached(src).then(function(text) {
                // 更新简介
                if (excerptEl) {
                    excerptEl.textContent = extractExcerpt(text);
                }
                // 提取标签并更新卡片 data 属性与显示
                var tag = extractTag(text);
                if (tag) {
                    card.dataset.tag = tag;
                    if (tagEl) {
                        tagEl.textContent = tag;
                    }
                }
                // 提取日期并填充
                var date = extractDate(text);
                if (date && dateEl) {
                    dateEl.textContent = date;
                }
            }).catch(function(err) {
                console.warn('无法获取摘要:', src, err);
            });
        }
    });

    // 同时让卡片点击时也使用缓存 fetch，减少重复请求
    document.getElementById('blog-list').addEventListener('click', function(e) {
        var card = e.target.closest('.blog-card');
        if (!card) return;

        var title  = filenameToTitle(card.dataset.mdSrc) || '（无标题）';
        var date   = card.querySelector('.blog-date') ? card.querySelector('.blog-date').textContent : '';
        // 优先使用卡片的 data-tag（已被异步更新），其次硬编码，最后空字符串
        var tag    = card.dataset.tag    || '';
        var mdSrc  = card.dataset.mdSrc;
        var mdInline = card.dataset.mdInline || '';

        if (mdSrc) {
            articleContent.innerHTML = '<div class="md-loading">正在加载……</div>';
            listView.classList.add('hidden');
            articleView.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            fetchMdCached(mdSrc)
                .then(function(text) {
                    // 从缓存的文本中再次提取标签，确保与卡片一致
                    var fetchedTag = extractTag(text) || tag;
                    showArticle(text, title, date, fetchedTag);
                })
                .catch(function(err) {
                    if (mdInline) {
                        showArticle(mdInline, title, date, tag);
                    } else {
                        articleContent.innerHTML =
                            '<div class="md-loading">无法加载文章内容（' + err.message + '）</div>';
                    }
                });
        } else if (mdInline) {
            showArticle(mdInline, title, date, tag);
        }
    });

})();
</script>

</body>
</html>
