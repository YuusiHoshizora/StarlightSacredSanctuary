<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星图·星光圣域</title>

    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/starmap/index.css">

    <script defer src="../assets/js/starmap-data.js"></script>
    <script defer src="../assets/js/starmap.js"></script>
    <script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then((reg) => {
      console.log('SW registered: ', reg.scope);
    }).catch((err) => {
      console.log('SW registration failed: ', err);
    });
  });
}
</script>
</head>

<body>

    <div class="background"></div>
    <div class="overlay"></div>

    <header class="navbar">

        <div class="logo">
            星光圣域
        </div>

        <nav>
            <a href="..">首页</a>
            <a href=".">星图</a>
            <a href="../fleet/">舰队</a>
            <a href="../archive/">档案</a>
        </nav>

    </header>

    <main>

        <div class="starmap-layout">

            <!-- 左侧：星图 -->
            <div class="starmap-left">
                <canvas id="starmap-canvas"></canvas>
            </div>

            <!-- 右侧：星系介绍 -->
            <aside class="starmap-right">

                <div id="system-info"></div>
                <div id="system-list" class="system-list"></div>

            </aside>

        </div>

    </main>
</body>
</html>
