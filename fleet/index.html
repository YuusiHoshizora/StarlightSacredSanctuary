<!DOCTYPE html>

    <link rel="stylesheet" href="../assets/css/fleet/index.css">
    <script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then((reg) => {
      console.log('SW registered: ', reg.scope);
    }).catch((err) => {
      console.log('SW registration failed: ', err);
    });
  });
}
</script>
</head>

<body>

    <div class="background"></div>
    <div class="overlay"></div>

    <header class="navbar">

        <div class="logo">
            星光圣域
        </div>

        <nav>
            <a href="../index.html">首页</a>
            <a href="../starmap/index.html">星图</a>
            <a href="index.html">舰队</a>
            <a href="../archive/index.html">档案</a>
        </nav>

    </header>

    <main>
        <section class="fleet-section">
            <div class="fleet-grid">

                <a href="#" class="fleet-card fleet-card--research">
                    <h2>科研与管理舰队</h2>
                    <p class="english">Research & Administration Fleet</p>
                    <p class="desc">科研与管理舰队是星光圣域人口最为密集的舰队，负责星光圣域绝大部分的科研任务。</p>
                </a>

                <a href="#" class="fleet-card fleet-card--industry">
                    <h2>工业与收集舰队</h2>
                    <p class="english">Industry & Collection Fleet</p>
                    <p class="desc">工业与收集舰队是星光圣域对外交流的主要舰队，负责几乎所有物资的收集和制造。</p>
                </a>

                <a href="#" class="fleet-card fleet-card--defense">
                    <h2>主防御舰队</h2>
                    <p class="english">Primary Defense Fleet</p>
                    <p class="desc">主防御舰队是星光圣域的军事舰队，负责所有的军事行动。</p>
                </a>

            </div>
        </section>
    </main>
